<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#f4f7fc;
}

header{
    background:#0A192F;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header a{
    color:white;
    text-decoration:none;
    background:red;
    padding:10px 18px;
    border-radius:8px;
}

.container{
    width:90%;
    margin:40px auto;
}

h2{
    margin-bottom:20px;
}

table{

    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.1);

}

th{

    background:#0A192F;
    color:white;
    padding:15px;

}

td{

    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;

}

tr:hover{

    background:#f5f5f5;

}

.dashboard-cards{
    display:flex;
    gap:20px;
    margin-bottom:35px;
}

.card{
    flex:1;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h3{
    color:#666;
    margin-bottom:15px;
}

.card h1{
    color:#0A192F;
    font-size:40px;
}

</style>

</head>

<body>

<header>

<h1>Admin Dashboard</h1>

<a href="/logout">
Logout
</a>

</header>

<div class="container">

<div class="dashboard-cards">

    <div class="card">
        <h3>Total Users</h3>
        <h1>{{ total_users }}</h1>
    </div>

    <div class="card">
        <h3>Total Messages</h3>
        <h1>{{ total_messages }}</h1>
    </div>

    <div class="card">
        <h3>Services</h3>
        <h1>7</h1>
    </div>

</div>

<h2>Contact Messages</h2>


<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Message</th>

</tr>

{% for contact in contacts %}

<tr>

<td>{{ contact[0] }}</td>

<td>{{ contact[1] }}</td>

<td>{{ contact[2] }}</td>

<td>{{ contact[3] }}</td>

<td>{{ contact[4] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
